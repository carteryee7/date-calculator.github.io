<!DOCTYPE html>
<html>
<head>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Nunito',sans-serif;
  background: linear-gradient(180deg, #a8d8a8 0%, #c8e6a0 40%, #7ec850 100%);
  min-height:100vh;
  cursor: none;
  overflow-x:hidden;
}

#leaf-cursor{
  position:fixed;
  pointer-events:none;
  z-index:9999;
  font-size:22px;
  transform:translate(-50%,-50%) rotate(-30deg);
  transition: transform 0.05s;
}

.wrap{
  padding:1.5rem 1rem 2rem;
  max-width:380px;
  margin:0 auto;
  position:relative;
}

h1{
  text-align:center;
  font-size:22px;
  font-weight:800;
  color:#4a7c2f;
  text-shadow: 0 2px 0 #fff8;
  margin-bottom:1.25rem;
  letter-spacing:0.5px;
}

.card{
  background: linear-gradient(160deg, #fffde7 0%, #f9f3c8 100%);
  border-radius:24px;
  border: 3px solid #d4b870;
  padding:1.25rem;
  box-shadow: 0 6px 0 #b89a40, 0 8px 16px #0002;
}

.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem}
.nav-title{font-size:16px;font-weight:800;color:#5a3e1b}
.nav-btn{
  background:#7ec850;
  border:2.5px solid #4a7c2f;
  border-radius:50%;
  width:32px;height:32px;
  cursor:none;
  font-size:14px;font-weight:800;
  color:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 0 #4a7c2f;
  transition:transform 0.1s, box-shadow 0.1s;
}
.nav-btn:hover{transform:translateY(2px);box-shadow:0 1px 0 #4a7c2f}
.nav-btn:active{transform:translateY(3px);box-shadow:none}

.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.dow{text-align:center;font-size:11px;color:#8a6a30;padding-bottom:6px;font-weight:700}

.day{
  text-align:center;
  padding:7px 0;
  border-radius:50%;
  font-size:13px;font-weight:700;
  cursor:none;
  color:#5a3e1b;
  border:2px solid transparent;
  user-select:none;
  transition:background 0.1s, transform 0.1s;
}
.day:hover{background:#c8f0a0;transform:scale(1.15)}
.day.empty{cursor:default;pointer-events:none}
.day.anchor{
  background:#7ec850;
  color:#fff !important;
  border-color:#4a7c2f;
  box-shadow:0 3px 0 #4a7c2f;
  transform:scale(1.15);
}
.day.hovered{
  background:#ffe082;
  color:#5a3e1b;
  border-color:#f0b030;
  transform:scale(1.12);
}
.day.in-range{background:#e8f8c8;color:#4a7c2f}
.day.today{border-color:#f0b030;border-width:2px}

.info{
  margin-top:1rem;
  min-height:48px;
  padding:10px 14px;
  border-radius:16px;
  border:2.5px solid #d4b870;
  background:#fffde7;
  font-size:13px;font-weight:700;
  color:#5a3e1b;
  display:flex;align-items:center;gap:8px;
  box-shadow:0 3px 0 #d4b870;
}
.hint{margin-top:8px;font-size:12px;color:#8a6a30;text-align:center;font-weight:600}

.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;background:#7ec850;border:2px solid #4a7c2f}

.clear-btn{
  margin-left:auto;
  background:#ff8a65;
  border:2px solid #e64a19;
  border-radius:12px;
  padding:3px 10px;
  font-size:12px;font-weight:800;
  color:#fff;
  cursor:none;
  box-shadow:0 2px 0 #e64a19;
  transition:transform 0.1s,box-shadow 0.1s;
  font-family:'Nunito',sans-serif;
}
.clear-btn:hover{transform:translateY(1px);box-shadow:0 1px 0 #e64a19}

.deco{
  text-align:center;
  font-size:20px;
  margin-bottom:0.5rem;
  letter-spacing:6px;
}

.grass{
  position:fixed;bottom:0;left:0;width:100%;
  font-size:28px;line-spacing:0;
  line-height:0.8;
  pointer-events:none;
  user-select:none;
  overflow:hidden;
  white-space:nowrap;
}
</style>
</head>
<body>

<div id="leaf-cursor">🍃</div>

<div class="grass" id="grass"></div>

<div class="wrap">
  <div class="deco">🌿 🌸 🍄 🌸 🌿</div>
  <h1>Tom Nook's Calendar</h1>
  <div class="card">
    <div class="nav">
      <button class="nav-btn" id="prev">&#8592;</button>
      <span class="nav-title" id="month-label"></span>
      <button class="nav-btn" id="next">&#8594;</button>
    </div>
    <div class="grid" id="grid"></div>
    <div class="info" id="info"></div>
    <div class="hint" id="hint"></div>
  </div>
</div>

<script>
const DAYS=['Su','Mo','Tu','We','Th','Fr','Sa'];
const MONTHS=['January 🌸','February ❄️','March 🌱','April 🌧️','May 🌼','June ☀️','July 🍉','August 🌊','September 🍂','October 🎃','November 🍁','December ⛄'];
const now=new Date();
let view={y:now.getFullYear(),m:now.getMonth()};
let anchor=null,hovered=null;

function dateKey(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function parseKey(k){const[y,mo,d]=k.split('-').map(Number);return new Date(y,mo-1,d);}
function dayDiff(a,b){return Math.round(Math.abs(parseKey(a)-parseKey(b))/86400000)+1;}
function fmt(k){return parseKey(k).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}

function render(){
  const{y,m}=view;
  document.getElementById('month-label').textContent=MONTHS[m]+' '+y;
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const todayKey=dateKey(now.getFullYear(),now.getMonth(),now.getDate());
  let lo=null,hi=null;
  if(anchor&&hovered){
    const ats=parseKey(anchor).getTime(),hts=parseKey(hovered).getTime();
    lo=Math.min(ats,hts);hi=Math.max(ats,hts);
  }
  const grid=document.getElementById('grid');
  grid.innerHTML=DAYS.map(d=>`<div class="dow">${d}</div>`).join('');
  for(let i=0;i<first;i++) grid.innerHTML+=`<div class="day empty"></div>`;
  for(let d=1;d<=days;d++){
    const k=dateKey(y,m,d);
    const ts=parseKey(k).getTime();
    let cls='day';
    if(k===todayKey) cls+=' today';
    if(anchor&&k===anchor) cls+=' anchor';
    else if(hovered&&k===hovered) cls+=' hovered';
    else if(lo&&hi&&ts>lo&&ts<hi) cls+=' in-range';
    grid.innerHTML+=`<div class="${cls}" data-k="${k}">${d}</div>`;
  }
  grid.querySelectorAll('.day:not(.empty)').forEach(el=>{
    el.addEventListener('click',()=>{
      const k=el.dataset.k;
      anchor=k===anchor?null:k; hovered=null;
      render();updateInfo();
    });
    el.addEventListener('mouseenter',()=>{if(anchor){hovered=el.dataset.k;render();updateInfo();}});
    el.addEventListener('mouseleave',()=>{if(anchor){hovered=null;render();updateInfo();}});
  });
}

function updateInfo(){
  const el=document.getElementById('info');
  const hint=document.getElementById('hint');
  if(!anchor){
    el.innerHTML=`<span style="font-size:16px">🌿</span><span style="color:#8a6a30">Click a day to set your start!</span>`;
    hint.textContent='';return;
  }
  if(!hovered){
    el.innerHTML=`<div class="dot"></div><span>Start: <strong>${fmt(anchor)}</strong></span><button class="clear-btn" id="clear-btn">✕ Clear</button>`;
    hint.textContent='🍃 Hover another day to see the gap!';
    document.getElementById('clear-btn').onclick=()=>{anchor=null;hovered=null;render();updateInfo();};
    return;
  }
  const diff=dayDiff(anchor,hovered);
  const dir=parseKey(hovered)>parseKey(anchor)?'after':'before';
  el.innerHTML=`<span style="font-size:16px">🌸</span><span><strong>${diff} day${diff!==1?'s':''}</strong> — ${fmt(hovered)} is ${dir}!</span><button class="clear-btn" id="clear-btn">✕ Clear</button>`;
  hint.textContent='Click the anchor to deselect, or pick a new day!';
  document.getElementById('clear-btn').onclick=()=>{anchor=null;hovered=null;render();updateInfo();};
}

document.getElementById('prev').onclick=()=>{if(view.m===0){view.m=11;view.y--;}else view.m--;render();};
document.getElementById('next').onclick=()=>{if(view.m===11){view.m=0;view.y++;}else view.m++;render();};

const leaf=document.getElementById('leaf-cursor');
document.addEventListener('mousemove',e=>{
  leaf.style.left=e.clientX+'px';
  leaf.style.top=e.clientY+'px';
});

const grassEl=document.getElementById('grass');
grassEl.textContent='🌿🌱🌿🌱🌿🌱🌿🌱🌿🌱🌿🌱🌿🌱🌿🌱🌿🌱🌿🌱🌿🌱🌿🌱🌿🌱🌿🌱🌿🌱🌿🌱🌿🌱🌿🌱🌿🌱🌿🌱';

render();updateInfo();
</script>
</body>
</html>
